name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - run: npm ci

      - name: Create config from example (CI uses placeholder credentials — unit tests mock gapi)
        run: cp src/config.example.ts src/config.ts

      - run: npm run compile

      - run: npm test
